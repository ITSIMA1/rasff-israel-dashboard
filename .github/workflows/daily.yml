name: Daily dashboard update

on:
  schedule:
    - cron: "0 6 * * *"   # כל יום ב-06:00 UTC (09:00 ישראל)
  workflow_dispatch:        # הרצה ידנית מ-GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python report.py

      - name: Commit updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dashboard.html
          git diff --cached --quiet || git commit -m "Dashboard update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
